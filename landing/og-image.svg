<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4f6f9"/>
      <stop offset="100%" style="stop-color:#e8edf5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="white" opacity="0.9"/>
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Logo icon -->
  <rect x="140" y="150" width="64" height="64" rx="14" fill="#1d4ed8"/>
  <path d="M152 178l20-16 20 16v24a4 4 0 01-4 4h-32a4 4 0 01-4-4v-24z" fill="white"/>
  <rect x="168" y="186" width="16" height="16" fill="rgba(255,255,255,0.5)"/>

  <!-- Brand name -->
  <text x="224" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#1e293b">Realia</text>

  <!-- Tagline -->
  <text x="140" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#0f172a">El copiloto de IA para</text>
  <text x="140" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#0f172a">desarrolladoras inmobiliarias</text>

  <!-- Description -->
  <text x="140" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#64748b">Respondé leads 24/7 · Automatizá actualizaciones de obra · Gestioná inversores</text>

  <!-- Domain -->
  <text x="140" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1d4ed8" font-weight="500">realia.lat</text>

  <!-- Decorative dots -->
  <circle cx="1060" cy="160" r="80" fill="#1d4ed8" opacity="0.06"/>
  <circle cx="1100" cy="480" r="50" fill="#6366f1" opacity="0.08"/>
</svg>
