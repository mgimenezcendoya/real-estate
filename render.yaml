services:
  # --- Backend (FastAPI) ---
  - type: web
    name: realia
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: real-state
      - key: S3_PUBLIC_URL
        sync: false
      - key: CHATWOOT_BASE_URL
        sync: false
      - key: CHATWOOT_API_TOKEN
        sync: false
      - key: CHATWOOT_ACCOUNT_ID
        sync: false
      - key: NOCODB_BASE_URL
        sync: false
      - key: NOCODB_API_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ENVIRONMENT
        value: development
      - key: SECRET_KEY
        generateValue: true

  # --- Frontend (Next.js) ---
  - type: web
    name: realia-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        sync: false
